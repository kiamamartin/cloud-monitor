name: Cloud Monitor CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx pytest pytest-asyncio ruff

    - name: Lint with Ruff
      run: |
        # Stop the build if there are syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --show-source
        
    - name: Run Pytest
      run: |
        PYTHONPATH=. pytest tests/ -v

    - name: Build Docker Image
      run: |
        docker build -t cloud-monitor-api:test .
